<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google-like Search Box</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }
        .search-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 4.5rem;
            margin-bottom: 25px;
            font-family: 'Product Sans', Arial, sans-serif;
            font-weight: normal;
        }
        /* Color matching for the logo text layout */
        .g1 { color: #4285F4; }
        .o1 { color: #EA4335; }
        .o2 { color: #FBBC05; }
        .g2 { color: #4285F4; }
        .l  { color: #34A853; }
        .e  { color: #EA4335; }

        .search-box {
            width: 100%;
            padding: 14px 22px;
            font-size: 16px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            outline: none;
            box-shadow: none;
            transition: box-shadow 0.2s;
            box-sizing: border-box;
        }
        .search-box:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }
        .btn-container {
            margin-top: 25px;
        }
        button {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            margin: 11px 4px;
            padding: 0 16px;
            line-height: 27px;
            height: 36px;
            min-width: 54px;
            cursor: pointer;
            user-select: none;
        }
        button:hover {
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            color: #202124;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <!-- Colored Header Text Layout -->
        <h1>
            <span class="g1">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
        </h1>
        
        <!-- Formspree Integration Setup using your active form ID xqevgodg -->
        <form action="https://formspree.io" method="POST">

            <!-- The essential name attribute parameter that maps string fields to Formspree -->
            <input type="text" name="user_search_query" class="search-box" placeholder="Search Google or type a URL" required>
            
            <div class="btn-container">
                <button type="submit">Google Search</button>
            </div>
        </form>
    </div>

</body>
</html>
